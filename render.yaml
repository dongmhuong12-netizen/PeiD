services:
  - type: web
    name: pei-bot
    env: python
    # TIÊU CHUẨN 100K+: Đảm bảo Python phiên bản mới nhất để chạy ổn định
    plan: starter 
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    autoDeploy: true

    # 1. KEEP ALIVE: Cấu hình để Render ping bot, tránh bị ngủ đông
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: PORT
        value: 10000
      - key: TOKEN
        sync: false # Token nên được nhập thủ công trên Dashboard Render để bảo mật

    # 2. HEALTH CHECK: Kết nối với Web Server trong main.py
    healthCheckPath: /
